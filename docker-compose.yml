
# ── AlphaCMS — Coolify Production ─────────────────────────

x-backend-common: &backend-common
  image: alphacms-backend:latest
 
  restart: unless-stopped
  volumes:
    - media:/var/www/html/storage/app/public

services:

  admin:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: https://api.alpha-cms.shop/api/v1
    restart: unless-stopped
    expose:
      - "80"
    labels:
      - traefik.enable=true
      - traefik.http.routers.admin.rule=Host(`admin.alpha-cms.shop`)
      - traefik.http.routers.admin.entrypoints=https
      - traefik.http.routers.admin.tls=true
      - traefik.http.routers.admin.tls.certresolver=letsencrypt
      - traefik.http.routers.admin.service=admin
      - traefik.http.services.admin.loadbalancer.server.port=80

  backend:
    <<: *backend-common
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    expose:
      - "80"
    volumes:
    - media:/var/www/html/storage/app/public
    - /data/uploads:/var/www/html/public/uploads:ro

  worker:
    <<: *backend-common
    user: www-data
    command: php artisan queue:work redis --queue=default,notifications,mail,search,sitemap,ai,analytics --tries=3 --backoff=10 --sleep=1 --max-time=3600
    healthcheck:
      test: ["CMD", "pgrep", "-f", "queue:work"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker-media:
    <<: *backend-common
    user: www-data
    command: php artisan queue:work redis-media --queue=media --tries=2 --timeout=2520 --sleep=2 --max-time=3600

  scheduler:
    <<: *backend-common
    user: www-data
    command: php artisan schedule:work

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        CLIENT: ${CLIENT:-shaabjo}
    image: alphacms-frontend:${CLIENT:-shaabjo}
    restart: unless-stopped
    environment:
      API_BASE_URL: ${API_BASE_URL}
      SITE_URL: ${SITE_URL}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
    volumes:
      - frontend-cache:/app/.next/cache
    expose:
      - "3000"
    depends_on:
      - backend

 
  meilisearch:
    image: getmeili/meilisearch:v1.16
  
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY}
      MEILI_ENV: production
    volumes:
      - meili-data:/meili_data

volumes:
  media:
  frontend-cache:
  meili-data:

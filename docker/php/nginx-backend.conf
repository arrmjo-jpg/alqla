# FORCE_REBUILD_CACHE_KEY: 2026-07-02-V2
# ── AlphaCMS API edge (nginx → php-fpm FastCGI) ────────────────────────────────
# php-fpm (127.0.0.1:9000) يتكلّم FastCGI لا HTTP. Traefik/Coolify يوجّه api.<domain> إلى هذه
# الخدمة على المنفذ 80، وتُترجم كلّ طلب HTTP إلى FastCGI عبر public/index.php. الموقع العامّ
# (Next.js) يُخدَم مباشرةً من Traefik → frontend:3000 (لا يمرّ من هنا). TLS يُنهى عند الحافة.

server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 512M;          # رفع وسائط الإدارة (فيديو/صور)

    # الوسائط المرفوعة (قرص 'public' المحلّيّ) — تُخدَم من المجلد المشترك مباشرةً.
    location /storage/ {
        alias /var/www/html/storage/app/public/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # مجلد الرفع المشترك (uploads) — يُخدَم مباشرة من المجلد المرفق.
    location /uploads/ {
        root /var/www/html/public;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # كلّ ما عداها → موجّه Laravel الأماميّ عبر FastCGI على php-fpm.
    location / {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        include fastcgi_params;
        fastcgi_param HTTP_PROXY "";    # تخفيف httpoxy
        fastcgi_read_timeout 120s;
    }
}
